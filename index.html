<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmor Web — Spectral Resynthesis Engine</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="header">
    <h1>Harmor Web</h1>
    <span class="subtitle">Spectral Additive Engine</span>
    
    <!-- モード切替タブ -->
    <div id="modeTabs">
      <button id="tabSynth" class="tab-btn active">🎹 シンセ作成モード</button>
      <button id="tabVocal" class="tab-btn">🎤 歌わせモード</button>
    </div>

    <span id="fileInfo">— ファイル未読み込み —</span>
  </header>

  <div id="toolbar">
    <div class="toolbar-group">
      <button id="loadBtn" class="btn-primary">📂 Load Audio</button>
      <input type="file" id="fileInput" accept="audio/*" hidden>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-label">FFT:</span>
      <select id="fftSizeSelect"><option value="2048">2048</option><option value="4096" selected>4096</option></select>
    </div>
    <button id="analyzeBtn" disabled>🔬 解析</button>
    <span id="partialCountBadge">— partials</span>
    <button id="synthesizeBtn" disabled class="btn-primary" style="margin-left:auto">⚡ 再合成</button>
  </div>

  <div id="mainContent">
    <div id="canvasArea">
      <div id="waveformWrapper">
        <canvas id="waveformCanvas"></canvas>
        <div id="dropZone"><span style="color:#8b949e;pointer-events:none">ここにドロップ</span></div>
      </div>
      <div id="spectrogramWrapper">
        <canvas id="spectrogramCanvas"></canvas>
        <canvas id="partialCanvas"></canvas>
        <canvas id="uiCanvas"></canvas>
      </div>
      
      <!-- ピアノロール (Synthモード専用) -->
      <div id="pianoRoll" style="display:none;"></div>
    </div>

    <aside id="controlPanel">
      <!-- 共通 -->
      <div class="panel-section">
        <h3>Global Pitch Shift</h3>
        <div class="slider-block">
          <div class="slider-header"><span class="label">Semitones</span><span class="value" id="pitchValue">+0.0</span></div>
          <input type="range" id="pitchSlider" min="-24" max="24" step="0.1" value="0">
        </div>
      </div>

      <!-- シンセ作成モード専用 -->
      <div id="panelSynth" class="panel-mode-group">
        <div class="panel-section">
          <h3>Playback Speed (Time-Stretch)</h3>
          <div class="slider-block">
            <div class="slider-header"><span class="label">Speed</span><span class="value" id="speedValue">1.0x</span></div>
            <input type="range" id="speedSlider" min="0" max="2" step="0.05" value="1">
          </div>
          <div style="font-size:10px;color:#8b949e;">※ 0.0倍で10秒間のフリーズ波形を生成。</div>
        </div>
        <div class="panel-section">
          <h3>Multi-sample Export</h3>
          <p class="hint" style="margin-bottom:8px">再合成時に2オクターブ分の音を自動生成します。</p>
          <button id="exportZipBtn" disabled style="width:100%">📦 24音をZIPでダウンロード</button>
        </div>
      </div>

      <!-- 歌わせモード専用 -->
      <div id="panelVocal" class="panel-mode-group" style="display:none;">
        <div class="panel-section">
          <h3>Pitch Curve Editor</h3>
          <label style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;">
            <input type="checkbox" id="snapCheck" checked> 12音スナップ (半音吸着)
          </label>
          <label style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;">
            <input type="checkbox" id="showOrigF0Check" checked> 推定ピッチカーブを表示
          </label>
          <button id="resetF0Btn" style="width:100%">描画リセット</button>
          <div style="font-size:10px;color:#8b949e;margin-top:8px">
            マウスドラッグでピッチを描画上書きします。
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div id="transport">
    <span id="timeDisplay">0:00.00</span>
    <div class="transport-sep"></div>
    <button id="playOrigBtn" disabled>▶ Original</button>
    <button id="playSynthBtn" disabled>▶ Synth</button>
    <button id="stopBtn">■ Stop</button>
    <div class="transport-sep"></div>
    <button id="exportBtn" disabled>💾 単体 WAV Export</button>
  </div>

  <div id="statusBar">
    <span class="status-msg info" id="statusMsg">Ready</span>
    <progress id="progressBar" max="1" value="0"></progress>
  </div>
</div>
<script src="js/fft.js"></script>
<script src="js/analysis.js"></script>
<script src="js/synthesis.js"></script>
<script src="js/renderer.js"></script>
<script src="js/audio.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
