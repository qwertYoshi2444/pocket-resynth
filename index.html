<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Harmor Clone - Additive Synthesis Pitch Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Harmor-Style Additive Pitch Editor</h1>
            <p>100% Client-side JS / Web Worker / No Dependencies</p>
        </header>

        <section class="controls">
            <div class="file-io">
                <input type="file" id="audio-upload" accept="audio/*">
                <button id="btn-process" disabled>Process & Synthesize</button>
                <button id="btn-play" disabled>Play Result</button>
                <button id="btn-export" disabled>Export WAV</button>
            </div>
            
            <div class="params">
                <label for="pitch-shift">Pitch Shift Ratio: <span id="pitch-val">1.0</span>x</label>
                <input type="range" id="pitch-shift" min="0.5" max="2.0" step="0.01" value="1.0">
            </div>
            <div id="status" class="status-msg">Waiting for audio file...</div>
        </section>

        <section class="visualizers">
            <h3>Spectrogram (Original)</h3>
            <canvas id="canvas-spec" width="800" height="256"></canvas>
            
            <h3>Waveform (Resynthesized)</h3>
            <canvas id="canvas-wave" width="800" height="128"></canvas>
        </section>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
